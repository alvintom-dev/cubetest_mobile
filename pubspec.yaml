name: cubetest_mobile
description: "A simple mobile app for construction's cube test management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^8.0.2
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.3
  timezone: ^0.10.0
  flutter_timezone: ^4.0.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path_android: assets/app_icon.png
  adaptive_icon_background: assets/logo_background.png
  adaptive_icon_foreground: assets/app_icon.png
  image_path_ios: assets/app_icon.png
  android: true
  min_sdk_android: 23
  ios: true
  remove_alpha_ios: true

flutter:
  uses-material-design: true
